name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "async"
          - "compression"
          - "json"
          - "encryption"
          - "tracing"
          - "async,compression,json,encryption,tracing"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -z "$FEATURES" ]; then
            cargo clippy --all-targets
          else
            cargo clippy --all-targets --features "$FEATURES"
          fi

      - name: Test
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -z "$FEATURES" ]; then
            cargo test --all-targets
          else
            cargo test --all-targets --features "$FEATURES"
          fi

  bench-compile:
    name: Bench (compile-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Check bench compiles
        run: cargo bench --no-run --features json

  msrv:
    name: MSRV (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
      - name: Check all features build
        run: cargo check --all-features

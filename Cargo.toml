[package]
name = "localcache"
version = "0.4.0"
edition = "2024"
authors = ["nabbisen"]
license = "Apache-2.0"
description = "A Rust library for caching expensive computation results associated with local files"
repository = "https://github.com/nabbisen/localcach-rs"
keywords = ["cache", "local-file", "sqlite", "embedding", "memoize"]
categories = ["caching", "filesystem"]

[features]
## Enables `AsyncCacheEngine` backed by `tokio::task::spawn_blocking`.
async = ["dep:tokio"]
## Enables transparent zstd compression of stored payloads.
compression = ["dep:zstd"]

[dependencies]
rusqlite = { version = "0.32", features = ["bundled"] }
serde     = { version = "1",    features = ["derive"] }
bincode   = "1.3"
blake3    = "1"
thiserror = "2"
tokio     = { version = "1", features = ["rt"],     optional = true }
zstd      = { version = "0.13",                     optional = true }

[dev-dependencies]
tempfile = "3"
tokio    = { version = "1", features = ["rt", "macros", "rt-multi-thread"] }
